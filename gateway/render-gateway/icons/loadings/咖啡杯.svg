<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <rect x="7" y="15" width="3" height="6" fill="oklch(var(--bc))" fill-opacity="0.5">
        <animate attributeName="y" dur="2s"
                 from="14" to="2" begin="0s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" dur="2s"
                 from="0.5" to="0" begin="0s" repeatCount="indefinite" />
    </rect>
    <rect x="11" y="8" width="3" height="6" fill="oklch(var(--bc))" fill-opacity="0.5">
        <animate attributeName="y" dur="2s"
                 values="8;0;0" begin="0s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" dur="2s"
                 values="0.3;0;0" begin="0s" repeatCount="indefinite" />
    </rect>
    <rect x="15" y="8" width="3" height="6" fill="oklch(var(--bc))" fill-opacity="0.5">
        <animate attributeName="y" dur="1.9s"
                 from="11" to="0" begin="0s" repeatCount="indefinite" />
        <animate attributeName="fill-opacity" dur="1.9s"
                 from="0.3" to="0" begin="0s" repeatCount="indefinite" />
    </rect>
    <rect x="6" y="10" width="13" height="16" fill="currentColor" rx="1" />
    <rect x="18" y="14" width="3" height="6" stroke-width="2" stroke="currentColor" />
</svg>