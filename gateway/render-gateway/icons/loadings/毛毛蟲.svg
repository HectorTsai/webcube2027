<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle r="3" cx="12" cy="3" fill="currentColor" transform-origin="center">
        <animateTransform attributeName="transform"
              type="rotate" from="0" to="360" dur="1.5s"
              repeatCount="indefinite" begin="0" />
    </circle>
    <circle r="2.5" cx="12" cy="3" fill="currentColor" fill-opacity="0.8" transform-origin="center">
        <animateTransform attributeName="transform"
              type="rotate" from="0" to="360" dur="1.5s"
              repeatCount="indefinite" begin="0.16s" />
    </circle>
    <circle r="2" cx="12" cy="3" fill="currentColor" fill-opacity="0.6" transform-origin="center">
        <animateTransform attributeName="transform"
              type="rotate" from="0" to="360" dur="1.5s"
              repeatCount="indefinite" begin="0.29s" />
    </circle>
    <circle r="1.5" cx="12" cy="3" fill="currentColor" fill-opacity="0.4" transform-origin="center">
        <animateTransform attributeName="transform"
              type="rotate" from="0" to="360" dur="1.5s"
              repeatCount="indefinite" begin="0.4s" />
    </circle>
    <circle r="1" cx="12" cy="3" fill="currentColor" fill-opacity="0.2" transform-origin="center">
        <animateTransform attributeName="transform"
              type="rotate" from="0" to="360" dur="1.5s"
              repeatCount="indefinite" begin="0.48s" />
    </circle>
</svg>
