<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <rect x="5" y="5" width="14" height="14" stroke="currentColor" stroke-width="2px" transform="rotate(45,12,12)">
        <animateTransform id="rotate" attributeName="transform" type="rotate"
                          from="45 12 12" to="225 12 12"
                          begin="second.end" dur="0.6s"
                          />
    </rect>
    <path stroke="currentColor" stroke-width="2px" d="M12,2 L22,12" visibility="visible">
        <animateMotion id="first" path="M0,0 L-10,10" keyTimes="0;0.5;1" keyPoints="0;0.8;1" dur="0.5s" begin="0s;rotate.end+0.5s" />
        <animate attributeName="visibility" values="hidden;visibility" begin="first.end" end="rotate.end" />
    </path>
    <path stroke="currentColor" stroke-width="2px" d="M12,2 L22,12" visibility="visible" opacity="0.6">
        <animateMotion path="M0,0 L-10,10" keyTimes="0;0.5;1" keyPoints="0;0.8;1" dur="0.5s" begin="0.04s;rotate.end+0.54s" />
        <animate attributeName="visibility" values="hidden;visibility" begin="first.end" end="rotate.end" />
    </path>
    <path stroke="currentColor" stroke-width="2px" d="M12,2 L2,12" visibility="visible">
        <animateMotion id="second" path="M0,0 L10,10" keyTimes="0;0.5;1" keyPoints="0;0.8;1" dur="0.5s" begin="first.end" />
        <animate attributeName="visibility" values="hidden;visibility" begin="second.end" end="rotate.end" />
    </path>
    <path stroke="currentColor" stroke-width="2px" d="M12,2 L2,12" visibility="visible" opacity="0.6">
        <animateMotion path="M0,0 L10,10" keyTimes="0;0.5;1" keyPoints="0;0.8;1" dur="0.5s" begin="first.end+0.04s" />
        <animate attributeName="visibility" values="hidden;visibility" begin="second.end" end="rotate.end" />
    </path>
</svg>
