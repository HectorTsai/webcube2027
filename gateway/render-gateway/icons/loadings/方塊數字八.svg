<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 55 55">
    <rect x="20" y="20" width="15" height="15" >
        <animateTransform id="a1" attributeName="transform"
                          type="rotate"
                          keyTimes="0;0.3;1"
                          values="360 35 20;90 35 20;0 35 20"
                          begin="0s;a2.end" dur="1s"
        />
        <animateTransform id="a2" attributeName="transform"
                          type="rotate"
                          keyTimes="0;0.3;1"
                          values="0 20 35;270 20 35;360 20 35"
                          begin="a1.end" dur="1s"
        />
    </rect>
</svg>
