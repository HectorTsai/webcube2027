<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圓環 -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  
  <!-- 旋轉的圓環 -->
  <circle cx="20" cy="20" r="16" fill="none" 
          stroke="currentColor" 
          stroke-width="3" 
          stroke-linecap="round"
          stroke-dasharray="20 100">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 20 20"
      to="360 20 20"
      dur="1s"
      repeatCount="indefinite"/>
  </circle>
</svg>
