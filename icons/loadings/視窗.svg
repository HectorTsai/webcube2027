<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
     class="window"
>
    <rect x="0" y="0" width="24" height="24" stroke="currentColor" stroke-width="4px" />
    <rect x="3" y="3" width="9" height="9" fill="color-mix(in oklch, currentColor 80%, black)">
        <animate id="a1" begin="0s;a1.end+1.4s" attributeName="x" values="3;12;12;3;3" dur="0.6s" />
        <animate id="a2" begin="0s;a2.end+1.4s" attributeName="y" values="3;3;12;12;3" dur="0.6s" />
    </rect>
    <rect x="12" y="12" width="9" height="9" fill="color-mix(in oklch, currentColor 80%, white)">
        <animate id="b1" begin="0s;b1.end+1.4s" attributeName="x" values="12;3;3;12;12" dur="0.6s" />
        <animate id="b2" begin="0s;b2.end+1.4s" attributeName="y" values="12;12;3;3;12" dur="0.6s" />
    </rect>
    <style>
        .window {
            animation: windowRotate 4s infinite linear;
        }
        @keyframes windowRotate {
            0%, 20% { transform: perspective(150px) rotateY(0deg); }
            30%, 70% { transform: perspective(150px) rotateY(180deg); }
            80%, 100% { transform: perspective(150px) rotate(360deg); }
        }
    </style>
</svg>