<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="2" fill="oklch(var(--bc))" transform-origin="center">
        <animate attributeName="cx"
                 values="12;3;12" dur="2s"
                 begin="0s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate"
                          values="180;3060" dur="2s"
                          begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="12" cy="12" r="2" fill="currentColor" transform-origin="center">
        <animate attributeName="cx"
                 values="12;3;12" dur="2s"
                 begin="0s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate"
                 values="0;2880" dur="2s"
                 begin="0s" repeatCount="indefinite" />
    </circle>
</svg>